{% extends 'layout.html' %}
{% block head %}
<style>
    .form-container { max-width: 500px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; color: #475569; }
    input { 
        width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; 
        font-size: 1rem; transition: 0.2s; outline: none; box-sizing: border-box;
    }
    input:focus { border-color: var(--primary); ring: 2px solid #c7d2fe; }
    .btn-submit { 
        width: 100%; background: var(--primary); color: white; border: none; 
        padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="margin-top: 0;">Register New Student</h2>
    <p style="color: #64748b; margin-bottom: 30px;">Fill in the details to create a new academic profile.</p>
    <form action="/add_logic" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="e.g. John Doe" required>
        </div>
        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" name="roll_no" placeholder="e.g. 101" required>
        </div>
        <div class="form-group">
            <label>Initial Marks (%)</label>
            <input type="number" name="marks" placeholder="0-100" required>
        </div>
        <button type="submit" class="btn-submit">Complete Registration</button>
    </form>
</div>
{% endblock %}
