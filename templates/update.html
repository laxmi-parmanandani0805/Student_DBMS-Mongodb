{% extends 'layout.html' %}
{% block head %}
<style>
    .update-container { max-width: 500px; margin: 60px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-left: 8px solid var(--primary); }
    .header-group { text-align: center; margin-bottom: 30px; }
    .icon-box { background: #e0e7ff; color: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 1.5rem; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; color: #475569; }
    input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: 0.2s; outline: none; box-sizing: border-box; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
    
    .btn-update { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1rem; }
    .btn-update:hover { background: var(--primary-dark); transform: translateY(-2px); }
</style>
{% endblock %}

{% block content %}
<div class="update-container">
    <div class="header-group">
        <div class="icon-box"><i class="fas fa-user-edit"></i></div>
        <h2 style="margin: 0;">Update Academic Marks</h2>
        <p style="color: #64748b;">Modify existing student performance records.</p>
    </div>

    <form action="/update_logic" method="POST">
        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" name="roll_no" placeholder="Enter student's unique roll no." required>
        </div>
        <div class="form-group">
            <label>New Marks (%)</label>
            <input type="number" name="marks" placeholder="Enter updated percentage" min="0" max="100" required>
        </div>
        <button type="submit" class="btn-update">Apply Changes</button>
    </form>
</div>
{% endblock %}
